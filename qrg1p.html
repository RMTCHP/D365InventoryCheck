      border-radius: 8px;
    }

    .corner::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #00ff00;
      border-radius: 4px;
      opacity: 0.6;
      animation: corner-pulse 2s infinite;
    }

    .corner.top-left {
      top: -4px;
      left: -4px;
      border-right: none;
      border-bottom: none;
    }

    .corner.top-right {
      top: -4px;
      right: -4px;
      border-left: none;
      border-bottom: none;
    }

    .corner.bottom-left {
      bottom: -4px;
      left: -4px;
      border-right: none;
      border-top: none;
    }

    .corner.bottom-right {
      bottom: -4px;
      right: -4px;

    .grid-line {
      position: absolute;

    .grid-line.horizontal {

      height: 1px;
    }

    .grid-line.vertical {
      height: 100%;

    }

    .grid-line:nth-child(1) { top: 25%; }
    .grid-line:nth-child(2) { top: 50%; }
    .grid-line:nth-child(3) { top: 75%; }
    .grid-line:nth-child(4) { left: 25%; }
    .grid-line:nth-child(5) { left: 50%; }
    .grid-line:nth-child(6) { left: 75%; }

    .scan-line {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 2px;
      background: linear-gradient(to right, transparent, #00ff00, transparent);

      z-index: 1005;

    @keyframes qr-scan-move {
      0% { top: calc(50% - 110px); opacity: 0.8; }
      50% { top: 50%; opacity: 1; }
      100% { top: calc(50% + 110px); opacity: 0.8; }
    }

    @keyframes corner-pulse {

function extractTagNoFromQrText(qrText) {
  const s = String(qrText || '').trim();
  if (!s) return '';

  // แยกด้วย / แล้วตัดช่องว่าง + ตัดอันที่ว่าง
  const parts = s.split('/').map(x => x.trim()).filter(Boolean);
  if (parts.length === 0) return '';

  // หา index ของ "MW6 Demo" (ไม่สนตัวพิมพ์เล็ก/ใหญ่)
  const mwIndex = parts.findIndex(p => /^MW6\s*Demo$/i.test(p));

  // ✅ ถ้ามี MW6 Demo -> เอากลุ่มก่อนหน้า MW6 Demo
  if (mwIndex > 0) return parts[mwIndex - 1];

  // ✅ ถ้าไม่มี MW6 Demo -> เอากลุ่มสุดท้าย
  return parts[parts.length - 1];
}


function updateTagNoUI(qrText) {
  const tagNo = extractTagNoFromQrText(qrText);
  const group = document.getElementById('tagNoGroup');
  const text = document.getElementById('tagNoText');

  if (tagNo) {
    text.textContent = tagNo;
    group.style.display = '';
  } else {
    text.textContent = '-';
    group.style.display = 'none';
  }
}

function getNewStatusOptions(mainProcess, subProcess, currentStatus) {
  const main = String(mainProcess || "").trim();
  const sub = String(subProcess || "").trim();
  const status = String(currentStatus || "").trim();
  if (!status) return [];

  const directMap = {
    "ผงเหล็ก(RM)": ["ผงเหล็ก(RM)"],
    "ผงปั่น(Mix)": ["ผงปั่น(Mix)"],
    "Green Part": ["Green Part"],
    "Quarantine Green Part": ["Quarantine Green Part"],
    "Sinter OK": ["Sintering"],
    "Quarantine Sinter": ["Quarantine Sintering"],
    "Check Crack OK": ["Check Crack"],
    "Quarantine Check Crack": ["Quarantine Check Crack"],
    "Oil Dip OK": ["Oil Dip"],
    "รอ Magna Flux - Blank Part": ["Sintering", "Sizing", "Machining"],
    "Wait Magna Flux - Blank Part": ["Sintering", "Sizing", "Machining"],
    "รอ Magna Flux - FG Part": ["Inspection"],
    "Wait Magna Flux - FG Part": ["Inspection"],
    "Magna Flux - Blank Part OK": ["Magna Flux"],
    "Magna Flux - FG Part OK": ["Inspection"],
    "Quarantine Magna Flux": ["Quarantine Magna Flux"],
    "รอ Shot blast": ["Machining"],
    "Wait Shot blast": ["Machining"],
    "Quarantine Shot blast": ["Quarantine Shot blast"],
    "รออัดน้ำมัน": ["Machining"],
    "Wait อัดน้ำมัน": ["Machining"],
    "รอ Sizing": ["Sintering", "Magna Flux"],
    "Wait Sizing": ["Sintering", "Magna Flux"],
    "Sizing OK": ["Sizing"],
    "Quarantine Sizing": ["Quarantine Sizing"],
    "Machining OK": ["Machining"],
    "Quarantine NC Lathe": ["Quarantine Machining"],
    "รอเจียร": ["Oil Impregnate"],
    "เจียร OK": ["Machining"],
    "Quarantine Grinding": ["Quarantine Machining"],
    "รอส่ง Sub Con": ["Sintering", "Sizing", "Machining"],
    "รับงาน OK - Sub con": ["Inspection"],
    "รอ QC Check": ["Inspection"],
    "รอ Inspection": ["Inspection"],
    "Inspection OK": ["Inspection"],
    "Quarantine Inspection": ["Quarantine Inspection"],
    "รอ Pack": ["Packing"],
    "Pack OK FG1": ["FG1"],
    "Re - Oil": ["Packing"],
    "Quarantine Pack": ["Packing"]
  };

  if (status === "รอ Machining" || status === "Wait Machining") {
    if (main === "Machining" && sub === "NCL") {
      return ["Sintering", "Check Crack"];
    }
    return ["Machining"];
  }

  if (status === "รอกลึง") return ["Machining"];
  if (status === "กลึง OK") return ["Machining"];
  if (status === "Magna Flux OK") return ["Magna Flux"];
  if (status === "Sort OK") return ["Inspection"];
  if (status === "รอ Sort") return ["Inspection"];
  if (status === "Quarantine Sort") return ["Quarantine Inspection"];

  return directMap[status] || [status];
}

function handleStatusChange() {
  const main = document.getElementById("mainProcess").value.trim();
  const sub = document.getElementById("subProcess").value.trim();
  const statusValue = document.getElementById("status").value.trim();
  const newStatusSelect = document.getElementById("newStatus");

  const options = getNewStatusOptions(main, sub, statusValue);
  newStatusSelect.innerHTML = "";

  if (!statusValue || options.length === 0) {
    newStatusSelect.disabled = true;
    newStatusSelect.style.backgroundColor = "#e5e7eb";
    newStatusSelect.innerHTML = "<option value=''>-- เลือกสถานะใหม่ --</option>";
    return;
  }

  if (options.length === 1) {
    newStatusSelect.disabled = true;
    newStatusSelect.style.backgroundColor = "#e5e7eb";
    const option = document.createElement("option");
    option.value = options[0];
    option.text = options[0];
    newStatusSelect.appendChild(option);
    return;
  }

  newStatusSelect.disabled = false;
  newStatusSelect.style.backgroundColor = "#ffffff";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.text = "-- เลือกสถานะใหม่ --";
  newStatusSelect.appendChild(defaultOption);

  options.forEach((item) => {
    const option = document.createElement("option");
    option.value = item;
    option.text = item;
    newStatusSelect.appendChild(option);
  });
}


  async function submitBarcode() {
  const barcode = document.getElementById("barcode").value.trim();
  const tagNo = extractTagNoFromQrText(barcode); // ✅ show only
  const quantity = document.getElementById("quantity").value.trim();
  const scanner = document.getElementById("scanner").value.trim();
  const mainProcess = document.getElementById("mainProcess").value.trim();

  const subProcessEl = document.getElementById("subProcess");
  const statusEl = document.getElementById("status");
  const newStatusEl = document.getElementById("newStatus");

  // ✅ หาก dropdown ถูก disable ให้ส่ง "ไม่มี"
  const subProcess = subProcessEl.disabled ? "ไม่มี" : subProcessEl.value.trim();
  const status = statusEl.disabled
  ? (statusEl.options[statusEl.selectedIndex]?.value
     || statusEl.options[0]?.value
     || statusEl.options[0]?.textContent
     || "ไม่มี")
  : statusEl.value.trim();
  const newStatus = newStatusEl.disabled
  ? (newStatusEl.options[newStatusEl.selectedIndex]?.value
     || newStatusEl.options[0]?.value
     || newStatusEl.options[0]?.textContent
     || "ไม่มี")
  : newStatusEl.value.trim();

  // ✅ ตรวจเฉพาะ field ที่ต้องไม่ว่างจริง ๆ
  if (!barcode || !quantity || !scanner || !mainProcess || !subProcess || !status || !newStatus) {
    Swal.fire({
      icon: "error",
      title: "กรอกข้อมูลไม่ครบ",
      text: "กรุณากรอกข้อมูลให้ครบทุกช่อง",
    });
    return;
  }

  // ✅ ตรวจสอบว่า quantity เป็นตัวเลขและมากกว่า 0
  if (isNaN(quantity) || Number(quantity) <= 0) {
    Swal.fire({
      icon: "warning",
      title: "จำนวนไม่ถูกต้อง",
      text: "กรุณากรอกจำนวนเป็นตัวเลขที่มากกว่า 0",
    });
    return;
  }

  // ✅ แสดงข้อมูลสำหรับยืนยัน
  const subProcessText = subProcessEl.options[subProcessEl.selectedIndex]?.textContent || subProcess;
  const statusText = statusEl.options[statusEl.selectedIndex]?.textContent || status;
  const newStatusText = newStatusEl.options[newStatusEl.selectedIndex]?.textContent || newStatus;
  const mainProcessText = mainProcess || "-";

  const confirmResult = await Swal.fire({
    title: "ยืนยันข้อมูลก่อนบันทึก",
    html: `
      <div style="text-align: left">
        <fieldset style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
          <legend><strong>🔎 รหัส QR Code</strong></legend>
          <p>${barcode}</p>
          ${tagNo ? `<p><strong>🏷️ Tag No.:</strong> ${tagNo}</p>` : ``}
        </fieldset>
        <fieldset style="border: 1px solid #ccc; padding: 10px;">
          <legend><strong>📋 รายละเอียด</strong></legend>
          <p><strong>⚙️ กระบวนการหลัก:</strong> ${mainProcessText}</p>
          <p><strong>🧩 กระบวนการย่อย:</strong> ${subProcessText}</p>
          <p><strong>📌 สถานะ:</strong> ${statusText}</p>
          <p><strong>🆕 สถานะใหม่:</strong> ${newStatusText}</p>
          <p><strong>🔢 จำนวน:</strong> ${quantity}</p>
          <p><strong>👤 ผู้สแกน:</strong> ${scanner}</p>
        </fieldset>
      </div>
    `,
    icon: "question",
    showCancelButton: true,
    confirmButtonText: "✅ ยืนยัน",
    cancelButtonText: "❌ ยกเลิก",
  });

  if (!confirmResult.isConfirmed) return;

  // ✅ แสดง loading ขณะส่งข้อมูล
  Swal.fire({
    title: "กำลังบันทึกข้อมูล...",
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    },
  });

  try {
    const res = await fetch(`${apiURL}?page=submitBarcode&barcode=${barcode}&quantity=${quantity}&scanner=${scanner}&mainProcess=${mainProcess}&subProcess=${subProcess}&status=${newStatus}`, {
      method: "POST"
    });
    const data = await res.json();

    if (data.success) {
      Swal.fire({
        icon: "success",
        title: "✅ บันทึกสำเร็จ",
        timer: 2000,
        showConfirmButton: false,
      });

      // ✅ รีเซ็ตฟอร์ม
      document.getElementById("barcode").value = "";
      updateTagNoUI(''); // ✅ เพิ่มบรรทัดนี้
      document.getElementById("quantity").value = "";
      document.getElementById("mainProcess").value = "";

      document.getElementById("subProcess").innerHTML = "<option value=''>-- เลือกกระบวนการย่อย --</option>";
      document.getElementById("subProcess").disabled = true;

      document.getElementById("status").innerHTML = "<option value=''>-- เลือกสถานะ --</option>";
      document.getElementById("status").disabled = true;
      document.getElementById("newStatus").innerHTML = "<option value=''>-- เลือกสถานะใหม่ --</option>";
      document.getElementById("newStatus").disabled = true;

    } else {
      Swal.fire({
        icon: "error",
        title: "เกิดข้อผิดพลาด",
        text: data.message,
      });
    }
  } catch (err) {
    Swal.fire({
      icon: "error",
      title: "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์",
      text: "กรุณาลองใหม่อีกครั้ง",
    });
    console.error(err);
  }
}


  // 🟢 เริ่มสแกน QR ด้วย ZXing
async function startScanner() {
  document.getElementById("main-view").style.display = "none";
  document.getElementById("scanner-view").style.display = "block";

  codeReader = new ZXing.BrowserMultiFormatReader();
  const videoElem = document.createElement("video");
  videoElem.setAttribute("autoplay", true);
  videoElem.setAttribute("muted", true);
  videoElem.setAttribute("playsinline", true);
  videoElem.style.width = "100%";
  videoElem.style.height = "100%";
  videoElem.style.objectFit = "cover";

  const container = document.getElementById("scanner-container");
  container.innerHTML = ""; // ล้างก่อน
  container.appendChild(videoElem);

  try {
    const constraints = { video: { facingMode: 'environment' } };
    await codeReader.decodeFromConstraints(constraints, videoElem, (result, err) => {
      if (result) {
        const cleanedText = result.text.replace(/\s*MW6 Demo\s*$/i, '').trim();
        document.getElementById("barcode").value = cleanedText;
        updateTagNoUI(cleanedText); // ✅ เพิ่มบรรทัดนี้
        document.getElementById("beep").play();
        stopScanner();
      }
    });
  } catch (err) {
    console.error("ไม่สามารถเปิดกล้อง:", err);
    Swal.fire({ icon: "error", title: "❌ ไม่สามารถเปิดกล้อง", text: err.message });
    stopScanner();
  }
}

// 🔴 หยุดการสแกน
function stopScanner() {
  if (codeReader) {
    codeReader.reset();
  }
  document.getElementById("scanner-container").innerHTML = "";
  document.getElementById("scanner-view").style.display = "none";
  document.getElementById("main-view").style.display = "block";
}

function handleSubProcessChange() {
  const main = document.getElementById("mainProcess").value;
  const subValue = document.getElementById("subProcess").value;
  const statusSelect = document.getElementById("status");

  if (main !== "Sinter" && main !== "Finishing" && main !== "Machining") {
    handleStatusChange();
    return;
  }

  const statusByMainAndSub = {
    "Sinter": {
      "S": ["Sinter OK", "Quarantine Sinter"],
      "ESE": ["Check Crack OK", "Quarantine Check Crack"],
      "OD": ["Oil Dip OK"]
    },
    "Finishing": {
      "OD": ["Wait Machining"],
      "SB": ["Wait Shot blast", "Wait Machining", "Quarantine Shot blast"],
      "OG": ["Wait อัดน้ำมัน", "Wait Machining"],
      "RP": ["Wait Sizing", "Sizing OK", "Quarantine Sizing"]
    },
    "Machining": {
      "NCL": ["Wait Machining", "Machining OK", "Quarantine NC Lathe"],
      "GC": ["รอเจียร", "เจียร OK", "Quarantine Grinding"]
    }
  };

  const statuses = statusByMainAndSub[main]?.[subValue] || [];
  statusSelect.innerHTML = "";

  if (statuses.length === 0) {
    statusSelect.disabled = true;
    statusSelect.style.backgroundColor = "#e5e7eb";
    statusSelect.innerHTML = "<option value=''>-- เลือกสถานะ --</option>";
  } else if (statuses.length === 1) {
    statusSelect.disabled = true;
    statusSelect.style.backgroundColor = "#e5e7eb";
    const option = document.createElement("option");
    option.value = statuses[0];
    option.text = statuses[0];
    statusSelect.appendChild(option);
  } else {
    statusSelect.disabled = false;
    statusSelect.style.backgroundColor = "#ffffff";
    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.text = "-- เลือกสถานะ --";
    statusSelect.appendChild(defaultOption);
    statuses.forEach((status) => {
      const option = document.createElement("option");
      option.value = status;
      option.textContent = status;
      statusSelect.appendChild(option);
    });
  }

  handleStatusChange();
}

function handleMainProcessChange() {
  const main = document.getElementById("mainProcess").value;
  const sub = document.getElementById("subProcess");
  const statusSelect = document.getElementById("status");
  const newStatusSelect = document.getElementById("newStatus");

  sub.innerHTML = "";
  statusSelect.innerHTML = "";
  newStatusSelect.innerHTML = "<option value=''>-- เลือกสถานะใหม่ --</option>";
  newStatusSelect.disabled = true;
  newStatusSelect.style.backgroundColor = "#e5e7eb";

  const processMap = {
    "Compacting": {
      sub: [["P", "P - Compact"]],
      status: [
        "Green Part",
        "Quarantine Green Part"
      ]
    },
    "Sinter": {
      sub: [
        ["S", "S - Sinter"],
        ["ESE", "ESE - Check Crack"],
        ["OD", "OD - Oil Dip"]
      ],
      status: []
    },
    "Finishing": {
      sub: [
        ["OD", "OD - Oil Dip"],
        ["SB", "SB - Shot blast"],
        ["OG", "OG - Impreganate"],
        ["RP", "RP - Sizing"]
      ],
      status: []
    },
    "Machining": {
      sub: [
        ["NCL", "NCL - NC Lathe"],
        ["GC", "GC - Grinding"]
      ],
      status: []
    },
    "Delivery": {
      sub: [["DELS", "DELS - Sub Con"]],
      status: ["รอส่ง Sub Con"]
    },
    "Receiving": {
      sub: [["RECS", "RECS - PC"]],
      status: ["รับงาน OK - Sub con"]
    },
    "QC Check": {
      sub: [["K", "K - QC Check"]],
      status: ["รอ QC Check"]
    },
    "Sort": {
      sub: [["SEL", "SEL - Sort"]],
      status: ["รอ Inspection", "Inspection OK", "Quarantine Inspection"]
    },
    "Packing": {
      sub: [["KON", "KON - Pack"]],
      status: ["รอ Pack", "Pack OK FG1", "Re - Oil", "Quarantine Pack"]
    },
    "Magna Flux": {
      sub: [["SEM", "SEM - Magna Flux"]],
      status: [
        "Wait Magna Flux - Blank Part",
        "Wait Magna Flux - FG Part",
        "Magna Flux - Blank Part OK",
        "Magna Flux - FG Part OK",
        "Quarantine Magna Flux"
      ]
    },
    "ผสมผง": {
      sub: [["", "ไม่มี"]],
      status: ["ผงเหล็ก(RM)", "ผงปั่น(Mix)"]
    }
  };

  const selected = processMap[main];

  // ✅ SUB PROCESS
  if (selected) {
    const isNoSub =
      selected.sub.length === 1 &&
      (selected.sub[0][0] === "" || selected.sub[0][1] === "ไม่มี");

    if (isNoSub) {
      sub.disabled = true;
      sub.style.backgroundColor = "#e5e7eb";
      const option = document.createElement("option");
      option.value = "";
      option.text = "ไม่มี";
      sub.appendChild(option);
    } else {
      sub.disabled = false;
      sub.style.backgroundColor = "#ffffff";

      if (selected.sub.length > 1) {
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.text = "-- เลือกกระบวนการย่อย --";
        sub.appendChild(defaultOption);
      }

      selected.sub.forEach(([value, label]) => {
        const option = document.createElement("option");
        option.value = value;
        option.text = label;
        sub.appendChild(option);
      });
    }
  } else {
    sub.disabled = true;
    sub.style.backgroundColor = "#e5e7eb";
    sub.innerHTML = "<option value=''>-- ไม่มีข้อมูล --</option>";
  }

  // ✅ STATUS
  const statuses = selected?.status || [];
  statusSelect.innerHTML = "";

  if (statuses.length === 1) {
    statusSelect.disabled = true;
    statusSelect.style.backgroundColor = "#e5e7eb";
    const option = document.createElement("option");
    option.value = statuses[0];
    option.text = statuses[0];
    statusSelect.appendChild(option);
  } else if (statuses.length > 1) {
    statusSelect.disabled = false;
    statusSelect.style.backgroundColor = "#ffffff";

    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.text = "-- เลือกสถานะ --";
    statusSelect.appendChild(defaultOption);

    statuses.forEach(status => {
      const option = document.createElement("option");
      option.value = status;
      option.textContent = status;
      statusSelect.appendChild(option);
    });
  } else {
    statusSelect.disabled = true;
    statusSelect.style.backgroundColor = "#e5e7eb";
    statusSelect.innerHTML = "<option value=''>ไม่มี</option>";
  }

  if (main === "Sinter" || main === "Finishing" || main === "Machining") {
    statusSelect.disabled = true;
    statusSelect.style.backgroundColor = "#e5e7eb";
    statusSelect.innerHTML = "<option value=''>-- เลือกสถานะ --</option>";
  }

  handleStatusChange();
}
